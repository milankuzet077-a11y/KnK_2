<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pristup</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 40px; }
      input, button { font-size: 16px; padding: 10px; }
      .box { max-width: 360px; }
      .err { color: #b00020; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Unesi šifru</h2>
      <input id="p" type="password" placeholder="Šifra" />
      <button id="b">Uđi</button>
      <div id="e" class="err"></div>
    </div>

    <script>
      const btn = document.getElementById("b");
      const inp = document.getElementById("p");

      function go() {
        const val = inp.value || "";
        if (!val) return;
        document.cookie = "site_auth=" + encodeURIComponent(val) + "; path=/; max-age=" + (60 * 60 * 24 * 7);
        location.href = "/";
      }

      btn.onclick = go;
      inp.addEventListener("keydown", (ev) => ev.key === "Enter" && go());
    </script>
  </body>
</html>
